version: "3.8"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - payment-net

x-common-env: &common-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_LOGS_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=payment-system
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_NAMESPACE: default

services:
  # ── Temporal Workflow Engine ──────────────────────────────────────────────────

  temporal-postgresql:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  temporal:
    <<: *service-defaults
    image: temporalio/auto-setup:1.22.6
    environment:
      DB: postgresql
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    ports:
      - "7233:7233"
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  temporal-ui:
    <<: *service-defaults
    image: temporalio/ui:2.22.3
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3001
    ports:
      - "3001:8080"
    depends_on:
      temporal:
        condition: service_healthy

  # ── Observability Stack ───────────────────────────────────────────────────────

  loki:
    <<: *service-defaults
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    <<: *service-defaults
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9095:9095"

  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "14317:4317"
      - "14318:4318"
      - "8889:8889"
    depends_on:
      tempo:
        condition: service_started

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics serviceGraph traceToLogs
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

  # ── Payment Application ───────────────────────────────────────────────────────

  payment-initiation:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: payment-initiation
    environment:
      <<: *common-env
      SERVICE_NAME: payment-initiation
      OTEL_SERVICE_NAME: payment-initiation
    ports:
      - "8001:8080"
    depends_on:
      temporal:
        condition: service_healthy
      otel-collector:
        condition: service_started

  temporal-worker:
    <<: *service-defaults
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: temporal-worker
    environment:
      <<: *common-env
      SERVICE_NAME: temporal-worker
      OTEL_SERVICE_NAME: temporal-worker
    ports:
      - "8020:8080"
    depends_on:
      temporal:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ── Load Generator ────────────────────────────────────────────────────────────

  load-generator:
    <<: *service-defaults
    build:
      context: ./load_generator
    environment:
      TARGET_URL: http://payment-initiation:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PAYMENTS_PER_MINUTE: "10"
    depends_on:
      payment-initiation:
        condition: service_started
    restart: on-failure

networks:
  payment-net:
    driver: bridge

volumes:
  temporal-db:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data:
