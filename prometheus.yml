global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  - job_name: payment-services
    static_configs:
      - targets:
          - "payment-initiation:8080"
          - "temporal-worker:8080"
    metrics_path: /actuator/prometheus
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        regex: "([^:]+):.*"
        replacement: "$1"
