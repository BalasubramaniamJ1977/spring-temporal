apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    basicAuth: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        # Use trace_id text search — matches our log pattern: trace_id=<32 hex>
        query: '{service_name="${__span.tags["service.name"]}"} |= "${__span.traceId}"'
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request Rate
            query: rate(traces_spanmetrics_calls_total{service="$${__tags.service}"}[5m])
          - name: P99 Latency
            query: histogram_quantile(0.99, sum(rate(traces_spanmetrics_duration_bucket{service="$${__tags.service}"}[5m])) by (le)) * 1000
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki

  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        # Extracts 32-char trace_id from log lines like: trace_id=3f591370a88dcc4c...
        # Creates a "View Trace" link that opens the trace in Tempo within the same panel
        - name: TraceID
          matcherRegex: 'trace_id=([a-f0-9]{32})'
          url: "${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View Trace ↗"
